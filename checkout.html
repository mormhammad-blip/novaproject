<body class="checkout-page">

      <header class="nav-bar">
    <img id="nav-img" src="./images/Screenshot 2025-06-16 at 01-15-22 Stamp FINAL NOVA - Stamp FINAL NOVA 2.pdf.png" alt="Logo">
    <nav>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>

  <h1 class="checkout-title">Checkout</h1>

  <form id="checkout-form" class="checkout-form">
    <label>
      Name:
      <input type="text" id="name" required>
    </label>

    <label>
      Phone Number:
      <input type="tel" id="phone" required>
    </label>

    <label>
      Location:
      <input type="text" id="location" required>
    </label>

    <fieldset>
      <legend>Payment Method:</legend>
      <label><input type="radio" name="payment" value="Cash on Delivery" checked> Cash on Delivery</label>
      <label><input type="radio" name="payment" value="Whish Money"> Whish Money</label>
    </fieldset>
    <button type="submit" class="send-btn">Send Order via WhatsApp</button>
</form>
      
  </form>

    <div class="bottom-image">
        <img src="./images/footer.png">

    </div>
